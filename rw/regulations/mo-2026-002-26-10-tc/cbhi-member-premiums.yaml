format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - rw/regulation/mo-2026-002-26-10-tc/cbhi-member-contributions
      - rw/statute/law-2015-03/community-based-health-insurance
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - rw/statute/law-2015-03/community-based-health-insurance
        - rw/regulation/mo-2026-002-26-10-tc/cbhi-member-contributions
      rationale: |-
        Law No 03/2015 governing the organisation of the community-based
        health insurance scheme is the higher authority delegating the
        determination of contribution amounts and payment modalities to
        Orders; Ministerial Order No 002/26/10/TC of 16/02/2026,
        published in the Official Gazette no Special of 23/02/2026,
        fixes the member premium schedule by IMIBEREHO Dynamic Social
        Registry level under that delegation. The statute was checked
        first and carries the delegation.
  summary: |-
    Ministerial Order No 002/26/10/TC of 16/02/2026, Article One,
    determines the CBHI member contribution in accordance with the
    level of registration in the IMIBEREHO Dynamic Social Registry: a
    member at level one pays FRW 4,000 per person per year paid by the
    State; level two pays FRW 3,000 plus FRW 1,000 paid by the State;
    levels three, four and five pay FRW 5,000, FRW 8,000 and FRW
    20,000. Article 5 brings the Order into force on publication
    (Official Gazette no Special of 23/02/2026). Timing context: this
    is the first gazetted carrier of the informal-sector premium
    schedule; the amounts ran administratively from 2024 under RSSB
    publication by monthly-income tier, and the parity oracle applies
    them in its 2025 system year while this module correctly starts
    2026-02-23 - the validation-year grounding gap is a recorded
    parity finding, not back-dated here. Co-payment and
    payment-obligation provisions (Articles 2-3) are out of the
    encoded premium surface.
rules:
