          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: rw/regulation/mo-2026-002-26-10-tc/cbhi-member-contributions
              excerpt: "(a) a member registered at level one pays an annual contribution of FRW 4,000 per person, and this amount is paid by the State; (b) a member registered at level two pays an annual contribution of FRW 3,000 per person, plus FRW 1,000 paid by the State; (c) a member registered at level three pays an annual contribution of FRW 5,000 per person; (d) a member registered at level four pays an annual contribution of FRW 8,000 per person; (e) a member registered at level five pays an annual contribution of FRW 20,000 per person."
