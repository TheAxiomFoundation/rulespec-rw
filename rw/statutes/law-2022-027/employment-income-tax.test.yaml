# Companion fixtures for the Law No 027/2022 Article 56 employment
# income tax schedules (rulespec-rw#1): Table 2 (CY2024 onward, the
# RW_2025 validation surface) at eight incomes including every band
# bound, Table 1 (CY2023) at one interior income, and the
# casual-labourer special rate. Hand arithmetic, Table 2:
# 80,000 -> 0.10 x 20,000 = 2,000; 100,000 -> 0.10 x 40,000 = 4,000;
# 150,000 -> 4,000 + 0.20 x 50,000 = 14,000; 200,000 -> 4,000 +
# 0.20 x 100,000 = 24,000; 500,000 -> 4,000 + 20,000 + 0.30 x 300,000
# = 114,000. Table 1: 150,000 -> 0.20 x 40,000 + 0.30 x 50,000 =
# 23,000. Casual: 100,000 -> 0.15 x 40,000 = 6,000.

- name: paye_table2_zero_income
  period:
    period_kind: month
    start: '2025-03-01'
    end: '2025-03-31'
  input:
    rw:statutes/law-2022-027/employment-income-tax#input.monthly_taxable_employment_income: 0
  output:
    rw:statutes/law-2022-027/employment-income-tax#employment_income_tax: 0

