    rw:statutes/composed/pilot-worker-disposable-income-pipeline#pilot_worker_net_salary: 46850
    rw:statutes/composed/pilot-worker-disposable-income-pipeline#pilot_worker_cbhi_levy: 234.25
    rw:statutes/composed/pilot-worker-disposable-income-pipeline#pilot_worker_disposable_income: 46615.75

- name: pilot_worker_zero
  period:
    period_kind: month
    start: '2025-03-01'
    end: '2025-03-31'
  input:
    rw:statutes/law-2022-027/employment-income-tax#input.monthly_taxable_employment_income: 0
    rw:regulations/po-2024-086-01/pension-contribution-rate#input.covered_remuneration: 0
