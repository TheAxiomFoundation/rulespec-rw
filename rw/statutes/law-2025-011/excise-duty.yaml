format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: rw/statute/law-2025-011/excise-duty
  summary: |-
    Law No 011/2025 of 27/05/2025 establishes excise duty on imported
    products, products manufactured in Rwanda and services supplied
    in Rwanda at the rates in its Annex (Article 4). Encoded rows:
    juices (10 percent for at least 30 percent local raw material
    content; other juices, lemonades, sodas and syrups 39 percent),
    beers (40 percent local / 65 percent other), wines (40 percent
    local / 70 percent other on a litre value capped at FRW 40,000),
    brandies-liquors-whiskies (60 percent local / 70 percent other on
    a litre value capped at FRW 150,000), other fermented beverages
    (65 percent) and other local-content alcoholic beverages (30
    percent), cigarettes (36 percent of the tax-inclusive retail
    price of a pack of 20 rods plus FRW 230 per pack), cigars (160
    percent), electronic cigarettes (FRW 30,000 per unit) and
    cartridges (FRW 24,400 per unit), premium fuel (FRW 183 per
    litre), gas oil (FRW 150 per litre), lubricants (37 percent),
    vehicles by engine-capacity and age class (5/10/15 percent),
    sweets and chewing gums (FRW 322 per kilogramme), chocolates
    (FRW 1,930 per kilogramme), cosmetics (15 percent), and telephone
    communications phased 12 percent for the first year following
    commencement, 14 percent during the second year and 15 percent
    from the third year (29 May anniversaries). The Annex carries no
    bottled-water row (the repealed 2023 law taxed it at 10 percent).
    Compliance provisions (declarations, tax stamps, fines,
    imprisonment) and the financial-transaction charge row are out of
    the encoded household surface.
  deferred_outputs:
    - output: rw:statutes/law-2025-011/excise-duty/a#related_persons
      reason: Definition requires representing interpersonal control, family degree, management, control, capital, and company participation relationships not available in the local entity schema.
    - output: rw:statutes/law-2025-011/excise-duty/b#taxable_product
      reason: Definition depends on product classification and whether a product is subject to excise duty under the Annex; a complete product taxonomy and HS-code matching relation is outside this encoding.
    - output: rw:statutes/law-2025-011/excise-duty/c#tax_stamp
      reason: Definition is documentary and concerns a physical sign affixed to products; no computable output is needed without a product-label entity.
    - output: rw:statutes/law-2025-011/excise-duty/d#commissioner_general
      reason: Institutional definition is documentary and does not create an executable amount, rate, or eligibility condition.
    - output: rw:statutes/law-2025-011/excise-duty/e#taxable_service
      reason: Definition depends on service taxonomy and Annex-listed service categories; this file encodes the Annex rates but not a full service membership classifier.
    - output: rw:statutes/law-2025-011/excise-duty/f#tax_administration
      reason: Institutional definition is documentary and does not create an executable amount, rate, or eligibility condition.
    - output: rw:statutes/law-2025-011/excise-duty/g#calendar_month
      reason: Calendar-period definition is structural runtime context rather than an executable legal output.
    - output: rw:statutes/law-2025-011/excise-duty/h#authorised_officer
      reason: Definition depends on administrative empowerment and identification facts outside the supported legal computation schema.
    - output: rw:statutes/law-2025-011/excise-duty/j#factory
      reason: Definition depends on plant, equipment, and appliance classification facts outside this encoding.
