# Companion fixtures for the Law No 011/2025 excise schedule
# (rulespec-rw#1). Periods sit inside the effective window (the law
# commenced on publication, 29/05/2025). Hand arithmetic: cigarettes
# retail 20,000 + 10 packs -> 0.36 x 20,000 + 230 x 10 = 7,200 + 2,300
# = 9,500; premium fuel 20 litres -> 183 x 20 = 3,660; gas oil 10
# litres -> 150 x 10 = 1,500 (the fuel probes match the RWAMOD
# per-litre arms exactly).

- name: cigarette_excise_10_packs
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    rw:statutes/law-2025-011/excise-duty#input.cigarette_retail_value: 20000
    rw:statutes/law-2025-011/excise-duty#input.cigarette_packs: 10
  output:
    rw:statutes/law-2025-011/excise-duty#cigarette_excise_duty: 9500

- name: cigarette_excise_zero
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    rw:statutes/law-2025-011/excise-duty#input.cigarette_retail_value: 0
    rw:statutes/law-2025-011/excise-duty#input.cigarette_packs: 0
  output:
    rw:statutes/law-2025-011/excise-duty#cigarette_excise_duty: 0

