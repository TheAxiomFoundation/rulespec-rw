format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
    source_sha256: 87ef6431cd76e5575a23265c7bd6921429b4e9ae8a079d95c5949ee159e2f893
  summary: |-
    Article 8 provides that a first-time member starts benefiting from medical care services thirty (30) days after payment; a child aged three (3) months or younger is covered by the parents' contribution, while contribution is required above that age; and medical care continues for thirty (30) days after insurance expiry. Articles 15, 17, 19, 23–27 prescribe funding rates, committee limits, deadlines, administrative-fine ranges, and transitional limits.
rules:
  - name: first_time_member_waiting_period_days
    kind: parameter
    dtype: Count
    source: Article 8, paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
              excerpt: "thirty (30) days after the payment"
    versions:
      - effective_from: '2015-04-13'
        formula: |-
          30

  - name: parental_contribution_child_age_limit_months
    kind: parameter
    dtype: Count
    source: Article 8, paragraph 2
    metadata:
      proof:
        atoms:
