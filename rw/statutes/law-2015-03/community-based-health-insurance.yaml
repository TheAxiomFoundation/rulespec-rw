  - name: first_time_member_may_receive_medical_services
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Article 8, paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
              excerpt: "A member who joins for the ﬁrst time the community-based health insurance scheme shall starts beneﬁting from medical care services thirty (30) days after the payment of his /her subscription fees"
    versions:
      - effective_from: '2015-04-13'
        formula: |-
          member_joins_scheme_for_first_time
          and member_contribution_has_been_paid
          and days_since_contribution_payment >= first_time_member_waiting_period_days

  - name: child_medical_services_covered_by_parents_contribution
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Article 8, paragraph 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
              excerpt: "medical services for a child aged three (3) months and younger shall be covered by the child's parents' contribution"
    versions:
      - effective_from: '2015-04-13'
        formula: |-
          person_is_child
          and child_age_months <= parental_contribution_child_age_limit_months
          and parents_contribution_has_been_paid

  - name: child_contribution_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Article 8, paragraph 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
              excerpt: "Payment of contribution shall be required for a child aged more than three (3) months."
    versions:
      - effective_from: '2015-04-13'
        formula: |-
          person_is_child
          and child_age_months > parental_contribution_child_age_limit_months

  - name: post_expiry_medical_care_continues
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Article 8, paragraph 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
              excerpt: "continue to receive medical care services for thirty days (30) upon expiry of the insurance"
    versions:
      - effective_from: '2015-04-13'
        formula: |-
          member_insurance_has_expired
          and days_since_insurance_expiry <= post_expiry_medical_care_grace_days

  - name: non_enrollment_administrative_fine_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Article 23, paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
              excerpt: "fails to enroll into health insurance scheme while he/she does not fall within the category of the needy eligible for assistance"
    versions:
      - effective_from: '2015-04-13'
        formula: |-
          person_failed_to_enroll_in_health_insurance
          and not person_is_needy_and_eligible_for_assistance

  - name: incitement_administrative_fine_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Article 23, paragraph 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
              excerpt: "incites others to refrain from enrolling into community-based health insurance scheme"
    versions:
      - effective_from: '2015-04-13'
        formula: |-
          person_incites_others_to_refrain_from_enrolling

  - name: unlawful_member_card_use_administrative_fine_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Article 24
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
              excerpt: "uses a member's card of community-based health insurance schemes contrary to law"
    versions:
      - effective_from: '2015-04-13'
        formula: |-
          person_uses_member_card_contrary_to_law

  - name: staff_misconduct_administrative_fine_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Article 25
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: rw/statute/law-2015-03/community-based-health-insurance
              excerpt: "staff member who commits misconduct in connection with community-based health insurance scheme"
    versions:
      - effective_from: '2015-04-13'
        formula: |-
          person_is_scheme_staff_member
          and person_commits_scheme_related_misconduct
