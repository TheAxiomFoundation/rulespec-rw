format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
  summary: |-
    The VUP Direct Support monthly household entitlement schedule: the
    operational manual provides that "Household entitlement should be
    calculated using the following table" with entitlements in Frw of
    7,500 for a one-member household, 12,000 for two, 15,000 for three,
    18,000 for four, and 21,000 for five or more members (the OCR renders
    the size-1 row's "1" as the letter "I"). Payments are monthly
    ("access their monthly transfers within the month for which they are
    due"). VUP Direct Support amounts are set administratively by
    LODA/MINALOC through this operational manual; no gazetted instrument
    fixes the household entitlement schedule. effective_from is 2024-07-01
    (the FY2024/25 manual); the RWAMOD v2.0 country report states the
    schedule is unchanged as of July 2025, and the byte-identical manual
    is also published in the FY2023/24 folder. This module encodes the
    Direct Support amount schedule only; targeting, retargeting, appeals,
    public-works, and financial-services content are out of scope.
  deferred_outputs:
    - output: rw:policies/loda-vup/operational-manual-safety-net-fy2024-25/b#community_household_selection_process
      reason: >-
        Sub-paragraph (b) describes districts and sectors selecting and
        adjusting the list of eligible households through community
        meetings and sector-council approval. This module encodes only the
        Direct Support monthly entitlement amount schedule; community-based
        targeting and selection is a separate enrollment surface not
        modeled here.
    - output: rw:policies/loda-vup/operational-manual-safety-net-fy2024-25/c#household_eligibility_and_prioritization_criteria
      reason: >-
        Sub-paragraph (c) sets household eligibility conditions (six-month
        sector residency and the Old Age Grant age threshold) and the
        resource-dependent priority ranking of eligible households.
        Eligibility determination and prioritization sit outside this
        module's Direct Support amount schedule.
    - output: rw:policies/loda-vup/operational-manual-safety-net-fy2024-25/e#targeting_list_administration_and_programme_financing
      reason: >-
        Sub-paragraph (e) covers entering the approved targeting list into
        the monitoring system and downstream programme administration
        (quarterly fund requests from MINECOFIN and LODA, community
        public-works selection, and graduation). List administration and
        programme financing are out of scope for the encoded amount
        schedule.
rules:
  - name: direct_support_one_member_household_entitlement
    kind: parameter
    dtype: Money
    period: Month
    unit: RWF
    source: VUP Operational Manual (LODA, FY2024/25) §1.1.4 — Direct Support household entitlement table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
              excerpt: "Number of HH members Household entitlements in Frw I 7,500"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          7500
