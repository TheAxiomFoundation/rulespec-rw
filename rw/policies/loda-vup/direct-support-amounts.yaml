    versions:
      - effective_from: '2024-07-01'
        formula: |-
          21000
  - name: monthly_direct_support
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: RWF
    source: VUP Operational Manual (LODA, FY2024/25) §1.1.4 — Direct Support household entitlement table (monthly transfers)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
              excerpt: "Household entitlement should be calculated using the following table"
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
              excerpt: "access their monthly transfers within the month"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
              excerpt: "I 7,500 2 12,000 3 15,000 4 18,000 5+ 21,000"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          if household_size >= 5: direct_support_five_or_more_member_household_entitlement else: if household_size == 4: direct_support_four_member_household_entitlement else: if household_size == 3: direct_support_three_member_household_entitlement else: if household_size == 2: direct_support_two_member_household_entitlement else: if household_size == 1: direct_support_one_member_household_entitlement else: 0
