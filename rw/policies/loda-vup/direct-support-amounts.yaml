          15000
  - name: direct_support_four_member_household_entitlement
    kind: parameter
    dtype: Money
    period: Month
    unit: RWF
    source: VUP Operational Manual (LODA, FY2024/25) §1.1.4 — Direct Support household entitlement table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
              excerpt: "4 18,000"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          18000
  - name: direct_support_five_or_more_member_household_entitlement
    kind: parameter
    dtype: Money
    period: Month
    unit: RWF
    source: VUP Operational Manual (LODA, FY2024/25) §1.1.4 — Direct Support household entitlement table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
