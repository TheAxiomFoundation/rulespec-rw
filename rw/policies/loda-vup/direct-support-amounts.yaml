format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
      - rw/statute/law-2024-066/state-finances-fy2024-25
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - rw/statute/law-2024-066/state-finances-fy2024-25
        - rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
      rationale: |-
        Law No 066/2024 of 26/06/2024 determining the State Finances
        for the 2024/2025 Fiscal Year is the checked statutory higher
        authority: it authorizes the FY2024/25 State expenditure
        (Article 2, FRW 5,690,144,278,196) including the Annex II
        social-protection sector support under which LODA/MINALOC
        funds the programme, and it prescribes no transfer value. VUP
        Direct Support transfer amounts are set administratively by
        LODA/MINALOC through the VUP Operational Manual (Safety Net
        Components); no gazetted instrument (law, presidential or
        ministerial order) fixes the Direct Support household
        entitlement schedule, so the operational manual is the
        official programme documentation for the encoded standing
        values.
  summary: |-
    The VUP Direct Support monthly household entitlement schedule: the
    operational manual provides that "Household entitlement should be
    calculated using the following table" with entitlements in Frw of
    7,500 for a one-member household, 12,000 for two, 15,000 for three,
    18,000 for four, and 21,000 for five or more members (the OCR renders
    the size-1 row's "1" as the letter "I"). Payments are monthly
    ("access their monthly transfers within the month for which they are
    due"). VUP Direct Support amounts are set administratively by
    LODA/MINALOC through this operational manual; no gazetted instrument
    fixes the household entitlement schedule. effective_from is 2024-07-01
    (the FY2024/25 manual); the RWAMOD v2.0 country report states the
    schedule is unchanged as of July 2025, and the byte-identical manual
    is also published in the FY2023/24 folder. This module encodes the
    Direct Support amount schedule only; targeting, retargeting, appeals,
    public-works, and financial-services content are out of scope.
rules:
  - name: direct_support_one_member_household_entitlement
    kind: parameter
    dtype: Money
    period: Month
    unit: RWF
    source: VUP Operational Manual (LODA, FY2024/25) §1.1.4 — Direct Support household entitlement table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
              excerpt: "Number of HH members Household entitlements in Frw I 7,500"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          7500
  - name: direct_support_two_member_household_entitlement
    kind: parameter
    dtype: Money
    period: Month
    unit: RWF
    source: VUP Operational Manual (LODA, FY2024/25) §1.1.4 — Direct Support household entitlement table
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: rw/policy/loda-vup/operational-manual-safety-net-fy2024-25
              excerpt: "2 12,000"
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          12000
  - name: direct_support_three_member_household_entitlement
    kind: parameter
    dtype: Money
    period: Month
    unit: RWF
